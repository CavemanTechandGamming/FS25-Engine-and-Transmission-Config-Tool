# =============================================================================
# FS25 Engine and Transmission Config Tool — build + GitHub Release
# Trigger: Actions → Build and Release → Run workflow
#
# Version tag/assets come from src/__init__.py (__version__).
# Bump that value before running this workflow.
#
# Release assets:
#   FS25 Engine and Transmission Config Tool-1.0.0-windows-portable.zip  (only zip)
#   FS25 Engine and Transmission Config Tool-1.0.0-windows-setup.exe
#   FS25 Engine and Transmission Config Tool-1.0.0-mac-apple-silicon
#   FS25 Engine and Transmission Config Tool-1.0.0-mac-intel
#   FS25 Engine and Transmission Config Tool-1.0.0-ubuntu
# =============================================================================
name: Build and Release

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version"
        required: false
        default: "3.14"
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      python_version: ${{ inputs.python_version }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read app version
        id: version
        run: |
          VERSION="$(python3 scripts/read_version.py)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

      - name: Ensure release tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release ${TAG} already exists. Bump __version__ in src/__init__.py and re-run."
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fs25-config-tool-*
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          APP_NAME="FS25 Engine and Transmission Config Tool"
          mkdir -p release-assets
          shopt -s nullglob
          chmod +x scripts/verify_release_binary.py

          require_exact_file() {
            local dir="$1"
            local expect="$2"
            local path="${dir}/${expect}"
            if [[ ! -f "$path" ]]; then
              echo "::error::Expected exact binary '${expect}' in ${dir}"
              echo "::error::Directory contents:"
              ls -la "$dir" || true
              exit 1
            fi
            printf '%s' "$path"
          }

          for dir in artifacts/fs25-config-tool-*; do
            [[ -d "$dir" ]] || continue
            name="$(basename "$dir")"
            echo "Processing artifact: ${name}"
            ls -lah "$dir" || true

            if [[ "$name" =~ ^fs25-config-tool-windows-(.+)-portable$ ]]; then
              art_version="${BASH_REMATCH[1]}"
              [[ "$art_version" == "$VERSION" ]] || {
                echo "::error::Artifact version ${art_version} != ${VERSION}"
                exit 1
              }
              src="$(require_exact_file "$dir" "${APP_NAME}.exe")"
              python3 scripts/verify_release_binary.py "$src" \
                --kind windows-exe \
                --expect-name "${APP_NAME}.exe"
              zip_name="${APP_NAME}-${VERSION}-windows-portable.zip"
              (
                cd "$dir"
                zip -9 -j "$GITHUB_WORKSPACE/release-assets/${zip_name}" "${APP_NAME}.exe"
              )
              # Also verify the zip is not tiny
              zip_size="$(wc -c <"release-assets/${zip_name}" | tr -d ' ')"
              if [[ "$zip_size" -lt 5242880 ]]; then
                echo "::error::Portable zip is only ${zip_size} bytes — too small."
                exit 1
              fi
              echo "Staged ${zip_name} (${zip_size} bytes)"

            elif [[ "$name" =~ ^fs25-config-tool-windows-(.+)-installer$ ]]; then
              art_version="${BASH_REMATCH[1]}"
              [[ "$art_version" == "$VERSION" ]] || {
                echo "::error::Artifact version ${art_version} != ${VERSION}"
                exit 1
              }
              setup_name="${APP_NAME}-${VERSION}-Setup.exe"
              src="$(require_exact_file "$dir" "${setup_name}")"
              python3 scripts/verify_release_binary.py "$src" \
                --kind windows-setup \
                --expect-name "${setup_name}"
              dest="${APP_NAME}-${VERSION}-windows-setup.exe"
              cp -f "$src" "release-assets/${dest}"
              echo "Staged ${dest}"

            elif [[ "$name" =~ ^fs25-config-tool-(mac-apple-silicon|mac-intel|ubuntu|debian|mint|fedora|arch)-(.+)$ ]]; then
              platform="${BASH_REMATCH[1]}"
              art_version="${BASH_REMATCH[2]}"
              [[ "$art_version" == "$VERSION" ]] || {
                echo "::error::Artifact version ${art_version} != ${VERSION}"
                exit 1
              }
              src="$(require_exact_file "$dir" "${APP_NAME}")"
              kind="linux"
              if [[ "$platform" == mac-* ]]; then
                kind="macos"
              fi
              python3 scripts/verify_release_binary.py "$src" \
                --kind "$kind" \
                --expect-name "${APP_NAME}"
              dest="${APP_NAME}-${VERSION}-${platform}"
              cp -f "$src" "release-assets/${dest}"
              chmod +x "release-assets/${dest}"
              echo "Staged ${dest}"

            else
              echo "::error::Unexpected artifact name: ${name}"
              exit 1
            fi
          done

          count="$(find release-assets -type f | wc -l)"
          if [[ "$count" -lt 1 ]]; then
            echo "::error::No release assets were staged."
            exit 1
          fi

          echo "Release assets:"
          ls -lah release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          EXTRA_FLAGS=()
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            EXTRA_FLAGS+=(--draft)
          fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            EXTRA_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --title "FS25 Engine and Transmission Config Tool ${VERSION}" \
            --generate-notes \
            "${EXTRA_FLAGS[@]}" \
            release-assets/*
