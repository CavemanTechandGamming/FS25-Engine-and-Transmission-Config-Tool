# =============================================================================
# FS25 Config Tool — build all platforms, then publish a GitHub Release
# Trigger: Actions → Build and Release → Run workflow
#
# Version tag/assets come from src/__init__.py (__version__).
# Bump that value before running this workflow.
#
# Release assets (single files — not zip-wrapped folders):
#   FS25ConfigTool-1.0.0-windows-portable.exe
#   FS25ConfigTool-1.0.0-windows-setup.exe
#   FS25ConfigTool-1.0.0-mac-apple-silicon
#   FS25ConfigTool-1.0.0-mac-intel
#   FS25ConfigTool-1.0.0-ubuntu
# =============================================================================
name: Build and Release

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version"
        required: false
        default: "3.14"
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      python_version: ${{ inputs.python_version }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read app version
        id: version
        run: |
          VERSION="$(python3 scripts/read_version.py)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

      - name: Ensure release tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release ${TAG} already exists. Bump __version__ in src/__init__.py and re-run."
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fs25-config-tool-*
          path: artifacts

      - name: Stage release assets (bare binaries)
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          shopt -s nullglob

          stage_one() {
            local src="$1"
            local dest="$2"
            if [[ ! -f "$src" ]]; then
              echo "::error::Missing expected file: ${src}"
              exit 1
            fi
            cp -f "$src" "release-assets/${dest}"
            chmod +x "release-assets/${dest}" || true
            echo "Staged ${dest}"
          }

          for dir in artifacts/fs25-config-tool-*; do
            [[ -d "$dir" ]] || continue
            name="$(basename "$dir")"

            if [[ "$name" =~ ^fs25-config-tool-windows-(.+)-portable$ ]]; then
              art_version="${BASH_REMATCH[1]}"
              [[ "$art_version" == "$VERSION" ]] || {
                echo "::error::Artifact version ${art_version} != ${VERSION}"
                exit 1
              }
              files=("$dir"/*.exe)
              stage_one "${files[0]}" "FS25ConfigTool-${VERSION}-windows-portable.exe"

            elif [[ "$name" =~ ^fs25-config-tool-windows-(.+)-installer$ ]]; then
              art_version="${BASH_REMATCH[1]}"
              [[ "$art_version" == "$VERSION" ]] || {
                echo "::error::Artifact version ${art_version} != ${VERSION}"
                exit 1
              }
              files=("$dir"/*-Setup.exe)
              if [[ ! -f "${files[0]}" ]]; then
                files=("$dir"/*.exe)
              fi
              stage_one "${files[0]}" "FS25ConfigTool-${VERSION}-windows-setup.exe"

            elif [[ "$name" =~ ^fs25-config-tool-(mac-apple-silicon|mac-intel|ubuntu|debian|mint|fedora|arch)-(.+)$ ]]; then
              platform="${BASH_REMATCH[1]}"
              art_version="${BASH_REMATCH[2]}"
              [[ "$art_version" == "$VERSION" ]] || {
                echo "::error::Artifact version ${art_version} != ${VERSION}"
                exit 1
              }
              files=("$dir"/FS25ConfigTool-*)
              # Prefer the non-.app path if both exist
              chosen=""
              for f in "${files[@]}"; do
                if [[ -f "$f" && "$f" != *.app ]]; then
                  chosen="$f"
                  break
                fi
              done
              if [[ -z "$chosen" ]]; then
                echo "::error::No binary found in ${dir}"
                ls -la "$dir" || true
                exit 1
              fi
              stage_one "$chosen" "FS25ConfigTool-${VERSION}-${platform}"

            else
              echo "::error::Unexpected artifact name: ${name}"
              exit 1
            fi
          done

          count="$(find release-assets -type f | wc -l)"
          if [[ "$count" -lt 1 ]]; then
            echo "::error::No release assets were staged."
            exit 1
          fi

          echo "Release assets:"
          ls -lah release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          EXTRA_FLAGS=()
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            EXTRA_FLAGS+=(--draft)
          fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            EXTRA_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --title "FS25 Config Tool ${VERSION}" \
            --generate-notes \
            "${EXTRA_FLAGS[@]}" \
            release-assets/*
